<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Markdown Editor</title>
    <meta name="description" content="A fast, feature-rich Markdown editor that runs entirely in your browser. No installation required.">
</head>
<body>

    <!-- Top Control Bar -->
    <div class="controls">
        <div id="menuContainer">
            <button id="menuToggleBtn" title="File Menu">Menu ☰</button>
            <div id="menuDropdown">
                <button id="newNoteBtn" class="menu-item">Add New Note (Ctrl+N)</button>
                <button id="renameBtn" class="menu-item">Rename Current Note</button>
                <div class="menu-separator"></div>
                <button id="saveBtn" class="menu-item">Save Current Note (Ctrl+S)</button>
                <button id="exportAllBtn" class="menu-item">Export All Notes (.zip)</button>
                <div class="menu-separator"></div>
                <button id="importBtn" class="menu-item">Import Files (.md)...</button>
                <button id="importFolderBtn" class="menu-item">Import Folder...</button>
                <div class="menu-separator"></div>
                <button id="findReplaceToggleBtn" class="menu-item">Find / Replace (Ctrl+F)</button>
                <div class="menu-separator"></div>
                <button id="themeToggleBtnMenu" class="menu-item">Toggle Theme</button>
            </div>
        </div>
        <button id="openBtn">Open File...</button>
        <button id="closeNoteBtn">Close Current Note</button>
        <label for="noteSwitcher">Switch:</label>
        <select id="noteSwitcher"></select>
        <label for="searchInput">Search:</label>
        <input type="search" id="searchInput" placeholder="Search content...">
        <button id="searchBtn">Go</button>
        <button id="themeToggleBtn" title="Toggle Light/Dark Theme">🎨</button>
    </div>

    <!-- Main App Area -->
    <div id="appContainer">
        <!-- Sidebar -->
        <div id="sidebar">
            <button id="sidebarToggleBtn" title="Collapse Sidebar">&lt;&lt;</button>
            <div class="sidebar-header">
                <h3>Notes</h3>
                <select id="sortOrder" title="Sort Notes">
                    <option value="modified-desc">Modified (Newest)</option>
                    <option value="modified-asc">Modified (Oldest)</option>
                    <option value="created-desc">Created (Newest)</option>
                    <option value="created-asc">Created (Oldest)</option>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                </select>
            </div>
            <div id="tagSection">
                <h4>Tags <button id="clearTagFilterBtn" style="display:none;">(Clear)</button></h4>
                <div id="tagList"></div>
            </div>
            <ul id="sidebarNoteList"></ul>
        </div>

        <!-- Main Content -->
        <div id="mainContent">
            <div id="tabs">
                <button id="addTabBtn" title="Add New Note">+</button>
            </div>
            <div id="editorToolbar">
                <button id="toolbarH1" class="heading-btn" title="Heading 1">H1</button>
                <button id="toolbarH2" class="heading-btn" title="Heading 2">H2</button>
                <button id="toolbarH3" class="heading-btn" title="Heading 3">H3</button>
                <button id="toolbarBold" title="Bold (Ctrl+B)">B</button>
                <button id="toolbarItalic" title="Italic (Ctrl+I)">I</button>
                <button id="toolbarStrikethrough" title="Strikethrough">S</button>
                <button id="toolbarBlockquote" title="Blockquote">&gt;</button>
                <button id="toolbarLink" title="Link">🔗</button>
                <button id="toolbarCode" title="Code">`</button>
                <button id="toolbarListUl" title="Bullet List">-</button>
                <button id="toolbarListOl" title="Numbered List">1.</button>
                <button id="toolbarTaskList" title="Task List">✓</button>
                <button id="toolbarHr" title="Horizontal Rule">—</button>
            </div>
            <div id="findReplaceBar">
                <input type="text" id="findInput" placeholder="Find">
                <input type="text" id="replaceInput" placeholder="Replace">
                <button id="findPrevBtn" title="Find Previous">▲</button>
                <button id="findNextBtn" title="Find Next">▼</button>
                <button id="replaceBtn" title="Replace">Replace</button>
                <button id="replaceAllBtn" title="Replace All">All</button>
                <span id="findMatchCount"></span>
                <button id="findReplaceCloseBtn" title="Close (Esc)">×</button>
            </div>
            <div class="container">
                <div id="editorContainer">
                    <textarea id="editor" spellcheck="false"></textarea>
                    <div id="statusBar">
                        <span id="wordCount">Words: 0</span> | <span id="charCount">Chars: 0</span>
                    </div>
                </div>
                <div id="resizer"></div>
                <div id="preview"></div>
            </div>
        </div>
    </div>

    <!-- Search Results Overlay -->
    <div id="searchResults">
        <button id="searchCloseBtn" title="Close Search Results">×</button>
        <h3>Search Results</h3>
        <div id="searchResultsContent"></div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" accept=".md,.txt" style="display:none;" multiple>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
